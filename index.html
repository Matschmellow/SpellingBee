<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Bee Speed Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Spelling Bee Trainer 🐝</h1>
            
            <div class="controls-wrapper">
                <div class="controls">
                    <select id="difficulty" title="Select Word Difficulty">
                        <option value="beginner">Beginner</option>
                        <option value="novice">Novice</option>
                        <option value="moderate">Moderate</option>
                        <option value="advanced">Advanced</option>
                        <option value="expert">Expert</option>
                        <option value="genius">Genius</option>
                        <option value="master">Master</option>
                        <option value="random">🎲 Random Words</option>
                    </select>
                    
                    <select id="timer-mode" title="Select Time Principle">
                        <option value="adaptive">⚖️ Adaptive Time</option>
                        <option value="timeattack">🔥 60s Time Attack</option>
                        <option value="zen">🧘 Zen (No Timer)</option>
                    </select>
                </div>

                <div class="controls toggle-controls">
                    <select id="voice-select" title="Select Voice">
                        <option value="">Loading voices...</option>
                    </select>
                    
                    <label class="toggle-switch" title="Show or hide the word before typing">
                        <input type="checkbox" id="show-word-toggle" checked>
                        <span class="slider"></span>
                        <span class="label-text">Show Word</span>
                    </label>
                </div>
                
                <button id="start-btn">Start Training</button>
            </div>
        </header>

        <main id="game-area" class="hidden">
            <div class="top-bar">
                <div class="timer-box">
                    <span id="time-left">0</span><span id="time-unit">s</span>
                </div>
                <div class="wpm-box">
                    <span id="wpm-display">0</span> WPM
                </div>
            </div>
            
            <div class="progress-bar-container" id="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <!-- Typing Interface -->
            <div class="typing-container" id="typing-container">
                
                <!-- Summary Screen -->
                <div id="summary-screen" class="hidden">
                    <h2>Time's Up! ⏰</h2>
                    <div class="summary-stats">
                        <p>Words Spelled: <span id="final-words">0</span></p>
                    </div>
                    <p class="restart-hint">Press <b>Enter</b> to restart</p>
                </div>

                <div id="word-display" class="word-display">
                    <!-- Spans will be injected here -->
                </div>
                
                <input type="text" id="hidden-input" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off">
            </div>

            <!-- Definition Box -->
            <div id="definition-box" class="definition-box">
                <span class="loading">Waiting for word...</span>
            </div>
            
            <div class="action-hints">
                <button id="replay-btn" class="icon-btn" title="Replay Audio (TAB)">🔊 Replay Word (TAB)</button>
                <span class="hint-text">Hit <b>ESC</b> to skip</span>
            </div>
        </main>

        <div class="stats-area">
            <div class="stat-box">
                <span>Streak</span>
                <span id="score" class="stat-value">0</span>
            </div>
            <div class="stat-box highlight">
                <span>Best Streak</span>
                <span id="best-streak" class="stat-value">0</span>
            </div>
            <div class="stat-box">
                <span>Total Words</span>
                <span id="total-correct" class="stat-value">0</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
