<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Bee Speed Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Spelling Bee Trainer 🐝</h1>
            
            <div class="controls-wrapper">
                <div class="controls">
                    <select id="difficulty" title="Select Word Difficulty">
                        <option value="beginner">Beginner</option>
                        <option value="novice">Novice</option>
                        <option value="moderate">Moderate</option>
                        <option value="advanced">Advanced</option>
                        <option value="expert">Expert</option>
                        <option value="genius">Genius</option>
                        <option value="master">Master</option>
                        <option value="random">🎲 Random Words</option>
                    </select>
                    
                    <select id="timer-mode" title="Select Time Mode">
                        <option value="auto">⏱️ Auto Time</option>
                        <option value="manual">⚙️ Manual Time</option>
                    </select>
                </div>

                <div id="manual-settings" class="hidden">
                    <input type="range" id="time-slider" min="3" max="30" value="10">
                    <span id="slider-val">10s</span>
                </div>
                
                <button id="start-btn">Start Training</button>
            </div>
        </header>

        <main id="game-area" class="hidden">
            <div class="top-bar">
                <div class="timer-box">
                    <span id="time-left">0</span>s
                </div>
                <div class="wpm-box">
                    <span id="wpm-display">0</span> WPM
                </div>
            </div>
            
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <!-- Typing Interface -->
            <div class="typing-container" id="typing-container">
                <div id="word-display" class="word-display">
                    <!-- Spans will be injected here -->
                </div>
                <!-- Hidden input for mobile keyboard & precise tracking -->
                <input type="text" id="hidden-input" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off">
            </div>
            
            <p class="hint">Type the word. Hit <b>ESC</b> to skip. <b>Click here to focus.</b></p>
        </main>

        <div class="stats-area">
            <div class="stat-box">
                <span>Streak</span>
                <span id="score" class="stat-value">0</span>
            </div>
            <div class="stat-box highlight">
                <span>Best Streak</span>
                <span id="best-streak" class="stat-value">0</span>
            </div>
            <div class="stat-box">
                <span>Total Words</span>
                <span id="total-correct" class="stat-value">0</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
